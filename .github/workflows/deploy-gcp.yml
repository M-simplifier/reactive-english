name: Deploy to GCP

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-gcp-main
  cancel-in-progress: true

env:
  IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REPOSITORY }}/${{ vars.SERVICE_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ vars.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build container
        run: |
          docker build \
            --tag "${IMAGE}:${GITHUB_SHA}" \
            --tag "${IMAGE}:latest" \
            .

      - name: Push container
        run: |
          docker push "${IMAGE}:${GITHUB_SHA}"
          docker push "${IMAGE}:latest"

      - id: deploy
        name: Deploy Cloud Run service
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ vars.GCP_REGION }}
          service: ${{ vars.SERVICE_NAME }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          env_vars_update_strategy: overwrite
          env_vars: |-
            DATABASE_BACKEND=postgres
            AUTH_DEV_MODE=0
            SESSION_COOKIE_SECURE=1
            SESSION_COOKIE_NAME=reactive_english_session
            GOOGLE_CLIENT_ID=${{ vars.GOOGLE_CLIENT_ID }}
          secrets_update_strategy: overwrite
          secrets: |-
            DATABASE_URL=${{ vars.DATABASE_URL_SECRET_NAME }}:latest
          flags: >-
            --allow-unauthenticated
            --service-account=${{ vars.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }}
            --add-cloudsql-instances=${{ vars.CLOUD_SQL_INSTANCE_CONNECTION_NAME }}
            --min-instances=0
            --max-instances=2
            --memory=512Mi
            --cpu=1

      - name: Print service URL
        run: echo "Cloud Run URL: ${{ steps.deploy.outputs.url }}"
